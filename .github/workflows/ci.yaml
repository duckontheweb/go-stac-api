name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: pre-commit/action@v3.0.1


  validate-api:
    name: Validate STAC API
    runs-on: ubuntu-latest

    strategy:
      matrix:
        backend: ["duckdb", "pgstac"]
        include:
          - backend: pgstac
            postgres_password: pgstac
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.10.4"
      - name: Set up Python
        run: uv python install
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
      - name: Install project
        run: uv sync --locked --all-extras --dev

      - name: Run server
        uses: hoverkraft-tech/compose-action@4894d2492015c1774ee5a13a95b1072093087ec3
        env:
          BACKEND: ${{ matrix.backend }}
        with:
          compose-file: ./docker/docker-compose.yaml
          services: api
      - name: Run stac-api-validator
        timeout-minutes: 5
        run: |
          uv run stac-api-validator \
            --root-url http://api:8080 \
            --conformance core --conformance collections \
            --collection naip
