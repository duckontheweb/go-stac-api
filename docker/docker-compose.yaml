services:
  api:
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
    container_name: api
    volumes:
      - ..:/mnt
    ports:
      - ${API_PORT:-8080}:8080
      - ${DEBUG_PORT:-2345}:2345
    environment:
      - BACKEND
      - DEBUG=${DEBUG:-"FALSE"}
      - GIN_MODE=${GIN_MODE:-debug}
    working_dir: /mnt
    depends_on:
      seed:
        restart: true
        condition: service_completed_successfully

include:
  - "../example/${BACKEND:-duckdb}/docker-compose.yaml"
